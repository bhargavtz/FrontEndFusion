<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form Snippet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --accent: #0ea5e9; --accent-dark: #0284c7; }
    .input-field { transition: border-color 0.2s, box-shadow 0.2s; }
    .input-field:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
    }
    .btn-send {
      background: var(--accent);
      transition: background-color 0.2s, transform 0.1s;
    }
    .btn-send:hover { background: var(--accent-dark); }
    .btn-send:active { transform: scale(0.98); }
    #success-msg { display: none; }
    #success-msg.show { display: flex; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-sky-50 to-cyan-50 flex items-center justify-center p-4">

  <div class="w-full max-w-xl">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">

      <!-- Top accent bar -->
      <div class="h-1.5 bg-gradient-to-r from-sky-400 to-cyan-400"></div>

      <div class="p-8">
        <h1 class="text-2xl font-bold text-gray-900 mb-1">Get in Touch</h1>
        <p class="text-sm text-gray-500 mb-7">Fill in the form below and we'll get back to you within 24 hours.</p>

        <!-- Success message (shown after submit) -->
        <div id="success-msg" class="items-center gap-3 bg-green-50 border border-green-200 rounded-xl p-4 mb-6">
          <svg class="w-5 h-5 text-green-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          <div>
            <p class="text-sm font-medium text-green-800">Message sent!</p>
            <p class="text-xs text-green-600">Thanks for reaching out. We'll reply soon.</p>
          </div>
        </div>

        <form id="contact-form" novalidate>
          <!-- Name + Email row -->
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
            <div>
              <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
              <input
                type="text" id="name" name="name"
                placeholder="Jane Smith" required
                class="input-field w-full px-4 py-2.5 border border-gray-200 rounded-lg text-gray-900 text-sm"
              />
            </div>
            <div>
              <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
              <input
                type="email" id="email" name="email"
                placeholder="jane@example.com" required
                class="input-field w-full px-4 py-2.5 border border-gray-200 rounded-lg text-gray-900 text-sm"
              />
            </div>
          </div>

          <!-- Subject -->
          <div class="mb-4">
            <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
            <select
              id="subject" name="subject"
              class="input-field w-full px-4 py-2.5 border border-gray-200 rounded-lg text-gray-900 text-sm bg-white"
            >
              <option value="">Select a topic…</option>
              <option value="general">General Inquiry</option>
              <option value="support">Technical Support</option>
              <option value="billing">Billing</option>
              <option value="partnership">Partnership</option>
              <option value="other">Other</option>
            </select>
          </div>

          <!-- Message -->
          <div class="mb-5">
            <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
            <textarea
              id="message" name="message"
              rows="5" required
              placeholder="Tell us how we can help…"
              class="input-field w-full px-4 py-2.5 border border-gray-200 rounded-lg text-gray-900 text-sm resize-none"
            ></textarea>
            <p class="text-xs text-gray-400 mt-1 text-right">
              <span id="char-count">0</span>/500
            </p>
          </div>

          <!-- Privacy checkbox -->
          <div class="flex items-start gap-2 mb-6">
            <input type="checkbox" id="privacy" name="privacy" required class="mt-0.5 w-4 h-4 text-sky-500 border-gray-300 rounded">
            <label for="privacy" class="text-xs text-gray-500">
              I agree to the
              <a href="#" class="text-sky-500 hover:underline">Privacy Policy</a>
              and consent to being contacted.
            </label>
          </div>

          <!-- Submit -->
          <button type="submit" class="btn-send w-full text-white font-semibold py-2.5 rounded-lg text-sm flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
            Send Message
          </button>
        </form>

        <!-- Contact info footer -->
        <div class="mt-8 pt-6 border-t border-gray-100 grid grid-cols-1 sm:grid-cols-3 gap-4 text-center">
          <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Email</p>
            <p class="text-sm text-gray-700">hello@example.com</p>
          </div>
          <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Phone</p>
            <p class="text-sm text-gray-700">+1 (555) 000-0000</p>
          </div>
          <div>
            <p class="text-xs font-medium text-gray-500 uppercase tracking-wide mb-1">Hours</p>
            <p class="text-sm text-gray-700">Mon–Fri, 9am–5pm</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const textarea = document.getElementById('message');
    const counter = document.getElementById('char-count');
    textarea.addEventListener('input', () => {
      counter.textContent = textarea.value.length;
      if (textarea.value.length > 500) textarea.value = textarea.value.slice(0, 500);
    });

    document.getElementById('contact-form').addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('success-msg').classList.add('show');
      e.target.reset();
      counter.textContent = '0';
    });
  </script>
</body>
</html>
